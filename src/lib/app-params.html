<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Params Example</title>
</head>
<body>
  <pre id="output"></pre>

  <script>
    // Determine if we are in Node or browser
    const isNode = typeof window === 'undefined';
    const windowObj = isNode ? { localStorage: new Map() } : window;
    const storage = windowObj.localStorage;

    // Convert camelCase to snake_case
    function toSnakeCase(str) {
      return str.replace(/([A-Z])/g, '_$1').toLowerCase();
    }

    // Get a parameter value from URL, storage, or default
    function getAppParamValue(paramName, options = {}) {
      const { defaultValue = undefined, removeFromUrl = false } = options;

      if (isNode) {
        return defaultValue;
      }

      const storageKey = `base44_${toSnakeCase(paramName)}`;
      const urlParams = new URLSearchParams(window.location.search);
      const searchParam = urlParams.get(paramName);

      // Optionally remove from URL
      if (removeFromUrl && searchParam !== null) {
        urlParams.delete(paramName);
        const newUrl = `${window.location.pathname}${urlParams.toString() ? '?' + urlParams.toString() : ''}${window.location.hash}`;
        window.history.replaceState({}, document.title, newUrl);
      }

      // Save in storage if exists
      if (searchParam !== null) {
        storage.setItem(storageKey, searchParam);
        return searchParam;
      }

      // Save default if provided
      if (defaultValue !== undefined) {
        storage.setItem(storageKey, defaultValue);
        return defaultValue;
      }

      // Fallback to stored value
      const storedValue = storage.getItem(storageKey);
      if (storedValue !== null) {
        return storedValue;
      }

      return null;
    }

    // Get all app parameters
    function getAppParams() {
      // Clear access token if requested
      if (getAppParamValue("clear_access_token") === 'true') {
        storage.removeItem('base44_access_token');
        storage.removeItem('token');
      }

      return {
        appId: getAppParamValue("app_id", { defaultValue: "YOUR_DEFAULT_APP_ID" }),
        token: getAppParamValue("access_token", { removeFromUrl: true }),
        fromUrl: getAppParamValue("from_url", { defaultValue: window.location.href }),
        functionsVersion: getAppParamValue("functions_version", { defaultValue: "1.0.0" }),
        appBaseUrl: getAppParamValue("app_base_url", { defaultValue: window.location.origin }),
      };
    }

    const appParams = getAppParams();

    // Display the parameters
    document.getElementById('output').textContent = JSON.stringify(appParams, null, 2);
  </script>
</body>
</html>
