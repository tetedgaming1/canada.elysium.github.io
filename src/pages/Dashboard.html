<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nation Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- date-fns -->
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
</head>
<body class="bg-slate-50 p-6">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { format } = dateFns;

    function Dashboard() {
      // Dummy data for demo
      const towns = [
        { id: 1, name: 'Springfield', chunks_claimed: 10, balance: 5000 },
        { id: 2, name: 'Rivertown', chunks_claimed: 5, balance: 3000 },
      ];
      const citizens = [
        { id: 1, username: 'Alice' },
        { id: 2, username: 'Bob' },
        { id: 3, username: 'Charlie' },
      ];
      const alliances = [
        { id: 1, nation_name: 'AlliedTown', relation: 'ally' },
        { id: 2, nation_name: 'EnemyLand', relation: 'enemy' },
      ];
      const transactions = [
        { id: 1, type: 'income', description: 'Taxes', amount: 1200, category: 'income' },
        { id: 2, type: 'expense', description: 'Market purchase', amount: 500, category: 'expense' },
      ];
      const laws = [
        { id: 1, type: 'tax', status: 'active', title: 'Income Tax', content: 'All citizens pay 10% income tax.' },
        { id: 2, type: 'law', status: 'inactive', title: 'Curfew', content: 'Curfew from 9pm to 5am.' },
      ];

      const totalPopulation = citizens.length;
      const totalChunks = towns.reduce((sum, t) => sum + (t.chunks_claimed || 0), 0);
      const treasury = towns.reduce((sum, t) => sum + (t.balance || 0), 0);

      const relationColors = {
        ally: 'bg-green-100 text-green-800 border border-green-200',
        enemy: 'bg-red-100 text-red-800 border border-red-200',
        neutral: 'bg-gray-100 text-gray-800 border border-gray-200',
        trade_partner: 'bg-blue-100 text-blue-800 border border-blue-200',
        vassal: 'bg-yellow-100 text-yellow-800 border border-yellow-200',
        overlord: 'bg-purple-100 text-purple-800 border border-purple-200',
      };

      return (
        <div className="space-y-8">
          <div>
            <h1 className="text-3xl font-bold">Nation Overview</h1>
            <p className="text-gray-600 mt-1">Command center for your Towny nation</p>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div className="p-4 bg-white rounded shadow flex flex-col items-center">
              <div className="text-sm text-gray-500">Towns</div>
              <div className="text-xl font-bold">{towns.length}</div>
            </div>
            <div className="p-4 bg-white rounded shadow flex flex-col items-center">
              <div className="text-sm text-gray-500">Citizens</div>
              <div className="text-xl font-bold">{totalPopulation}</div>
            </div>
            <div className="p-4 bg-white rounded shadow flex flex-col items-center">
              <div className="text-sm text-gray-500">Treasury</div>
              <div className="text-xl font-bold">{treasury.toLocaleString()}g</div>
            </div>
            <div className="p-4 bg-white rounded shadow flex flex-col items-center">
              <div className="text-sm text-gray-500">Territory</div>
              <div className="text-xl font-bold">{totalChunks} chunks</div>
            </div>
          </div>

          {/* Transactions */}
          <div className="grid lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 p-4 bg-white rounded shadow">
              <h2 className="font-semibold mb-2">Recent Transactions</h2>
              {transactions.length === 0 ? (
                <p className="text-sm text-gray-500 text-center py-4">No transactions yet</p>
              ) : (
                <div className="space-y-2">
                  {transactions.map(tx => (
                    <div key={tx.id} className="flex justify-between py-1 border-b last:border-0">
                      <div>{tx.description}</div>
                      <div className={tx.type === 'income' ? 'text-green-600 font-semibold' : 'text-red-600 font-semibold'}>
                        {tx.type === 'income' ? '+' : '-'}{tx.amount.toLocaleString()}g
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Diplomacy */}
            <div className="p-4 bg-white rounded shadow">
              <h2 className="font-semibold mb-2">Diplomacy</h2>
              {alliances.length === 0 ? (
                <p className="text-sm text-gray-500 text-center py-4">No relations yet</p>
              ) : (
                <div className="space-y-2">
                  {alliances.map(a => (
                    <div key={a.id} className="flex justify-between items-center py-1">
                      <div>{a.nation_name}</div>
                      <div className={`text-xs px-2 py-0.5 rounded ${relationColors[a.relation] || ''}`}>{a.relation.replace(/_/g,' ')}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Laws */}
          <div className="p-4 bg-white rounded shadow">
            <h2 className="font-semibold mb-2">Latest Laws & Decrees</h2>
            {laws.length === 0 ? (
              <p className="text-sm text-gray-500 text-center py-4">No laws enacted yet</p>
            ) : (
              <div className="grid md:grid-cols-3 gap-4">
                {laws.map(law => (
                  <div key={law.id} className="p-4 rounded border bg-gray-50">
                    <div className="flex gap-2 mb-1">
                      <div className="text-xs px-1 border rounded">{law.type}</div>
                      <div className={`text-xs px-1 border rounded ${law.status === 'active' ? 'border-green-300 text-green-600' : 'text-gray-500'}`}>{law.status}</div>
                    </div>
                    <div className="font-semibold text-sm">{law.title}</div>
                    <div className="text-xs text-gray-500 mt-1">{law.content}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
