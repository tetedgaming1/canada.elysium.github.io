<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Citizens Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- date-fns -->
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
</head>
<body class="bg-slate-50 p-6">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { format } = dateFns;

    // Role icons as simple emoji
    const roleIcons = {
      leader: "👑",
      councilor: "🛡️",
      general: "⚔️",
      builder: "🔨",
      diplomat: "🌐",
      citizen: "👤",
    };

    // Role colors (Tailwind classes)
    const roleColors = {
      leader: 'bg-yellow-100 text-yellow-800',
      councilor: 'bg-blue-100 text-blue-800',
      general: 'bg-red-100 text-red-800',
      builder: 'bg-green-100 text-green-800',
      diplomat: 'bg-purple-100 text-purple-800',
      citizen: 'bg-gray-100 text-gray-800',
    };

    // Dummy API simulation
    const fakeCitizens = [
      { id: 1, username: "Alice", town: "Springfield", role: "leader", rank: "Mayor", joined_date: "2023-01-15", notes: "Important citizen" },
      { id: 2, username: "Bob", town: "Rivertown", role: "builder", rank: "Engineer", joined_date: "2023-02-20", notes: "" },
      { id: 3, username: "Charlie", town: "Springfield", role: "general", rank: "Commander", joined_date: "2023-03-10", notes: "Top general" },
    ];

    function Citizens() {
      const [citizens, setCitizens] = useState([]);
      const [dialogOpen, setDialogOpen] = useState(false);
      const [editingCitizen, setEditingCitizen] = useState(null);
      const [form, setForm] = useState({ username: '', town: '', role: 'citizen', rank: '', joined_date: '', notes: '' });
      const [search, setSearch] = useState('');

      useEffect(() => {
        // Simulate fetching citizens
        setCitizens(fakeCitizens);
      }, []);

      const filtered = citizens.filter(c =>
        c.username.toLowerCase().includes(search.toLowerCase()) ||
        c.town.toLowerCase().includes(search.toLowerCase())
      );

      const handleEdit = (c) => {
        setEditingCitizen(c);
        setForm({ ...c });
        setDialogOpen(true);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (editingCitizen) {
          setCitizens(citizens.map(c => c.id === editingCitizen.id ? form : c));
        } else {
          setCitizens([...citizens, { ...form, id: Date.now() }]);
        }
        setDialogOpen(false);
        setEditingCitizen(null);
        setForm({ username: '', town: '', role: 'citizen', rank: '', joined_date: '', notes: '' });
      };

      const handleDelete = (id) => {
        setCitizens(citizens.filter(c => c.id !== id));
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <h1 className="text-3xl font-bold">Citizens</h1>
            <button className="px-4 py-2 bg-blue-600 text-white rounded" onClick={() => setDialogOpen(true)}>Add Citizen</button>
          </div>

          <input
            type="text"
            placeholder="Search..."
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            className="border rounded px-2 py-1 w-full max-w-sm"
          />

          <table className="min-w-full border-collapse border border-gray-300 mt-4">
            <thead>
              <tr className="bg-gray-100">
                <th className="border p-2 text-left">Username</th>
                <th className="border p-2 text-left">Town</th>
                <th className="border p-2 text-left">Role</th>
                <th className="border p-2 text-left">Rank</th>
                <th className="border p-2 text-left">Joined</th>
                <th className="border p-2 text-left">Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => (
                <tr key={c.id} className="hover:bg-gray-50">
                  <td className="border p-2">{c.username}</td>
                  <td className="border p-2">{c.town}</td>
                  <td className={`border p-2 ${roleColors[c.role] || ''} rounded`}>
                    <span className="inline-flex items-center gap-1">
                      {roleIcons[c.role] || '👤'} {c.role}
                    </span>
                  </td>
                  <td className="border p-2">{c.rank || '—'}</td>
                  <td className="border p-2">{c.joined_date ? format(new Date(c.joined_date), 'MMM d, yyyy') : '—'}</td>
                  <td className="border p-2 space-x-2">
                    <button className="px-2 py-1 bg-yellow-200 rounded" onClick={() => handleEdit(c)}>Edit</button>
                    <button className="px-2 py-1 bg-red-200 rounded" onClick={() => handleDelete(c.id)}>Delete</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

          {dialogOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center">
              <div className="bg-white p-6 rounded w-full max-w-md">
                <h2 className="text-xl font-bold mb-4">{editingCitizen ? 'Edit Citizen' : 'Add Citizen'}</h2>
                <form onSubmit={handleSubmit} className="space-y-2">
                  <div>
                    <label className="block mb-1">Username</label>
                    <input className="border px-2 py-1 w-full" value={form.username} onChange={e => setForm({...form, username: e.target.value})} required />
                  </div>
                  <div>
                    <label className="block mb-1">Town</label>
                    <input className="border px-2 py-1 w-full" value={form.town} onChange={e => setForm({...form, town: e.target.value})} />
                  </div>
                  <div>
                    <label className="block mb-1">Role</label>
                    <select className="border px-2 py-1 w-full" value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                      {Object.keys(roleIcons).map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block mb-1">Rank / Title</label>
                    <input className="border px-2 py-1 w-full" value={form.rank} onChange={e => setForm({...form, rank: e.target.value})} />
                  </div>
                  <div>
                    <label className="block mb-1">Joined Date</label>
                    <input type="date" className="border px-2 py-1 w-full" value={form.joined_date} onChange={e => setForm({...form, joined_date: e.target.value})} />
                  </div>
                  <div>
                    <label className="block mb-1">Notes</label>
                    <textarea className="border px-2 py-1 w-full" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} />
                  </div>
                  <div className="flex justify-end gap-2 mt-2">
                    <button type="button" className="px-3 py-1 bg-gray-200 rounded" onClick={() => setDialogOpen(false)}>Cancel</button>
                    <button type="submit" className="px-3 py-1 bg-blue-600 text-white rounded">{editingCitizen ? 'Update' : 'Add'}</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Citizens />);
  </script>
</body>
</html>
