<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laws & Decrees</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide-react@0.276.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-slate-50 p-6">
<div id="root"></div>

<script type="text/babel">

const { useState } = React;
const { format } = dateFns;
const { ScrollText, Plus, Trash2, Pencil, Gavel, BookOpen, Megaphone } = lucideReact;

const typeConfig = {
  law: { icon: Gavel, color: 'bg-blue-100 text-blue-800 border border-blue-200' },
  decree: { icon: ScrollText, color: 'bg-purple-100 text-purple-800 border border-purple-200' },
  announcement: { icon: Megaphone, color: 'bg-green-100 text-green-800 border border-green-200' },
  guideline: { icon: BookOpen, color: 'bg-yellow-100 text-yellow-800 border border-yellow-200' },
};

function Laws() {
  const [dialogOpen, setDialogOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ title: '', content: '', type: 'law', status: 'active', enacted_date: '', author: '' });

  // Dummy laws data
  const laws = [
    { id:1, title:'Tax Reform', content:'All citizens pay 5% tax on trades.', type:'law', status:'active', enacted_date:'2023-01-15', author:'King Arthur'},
    { id:2, title:'Market Decree', content:'Market open every Sunday.', type:'decree', status:'active', enacted_date:'2023-02-01', author:'Council'},
    { id:3, title:'Announcement: Festival', content:'Spring festival on March 21.', type:'announcement', status:'active', enacted_date:'2023-03-01', author:'Mayor'},
  ];

  const handleEdit = (l) => {
    setEditing(l);
    setForm({...l});
    setDialogOpen(true);
  };

  const resetForm = () => {
    setForm({ title: '', content: '', type: 'law', status: 'active', enacted_date: '', author: '' });
    setEditing(null);
    setDialogOpen(false);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if(editing) {
      alert('Update simulated: ' + JSON.stringify(form));
    } else {
      alert('Create simulated: ' + JSON.stringify(form));
    }
    resetForm();
  };

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-3xl font-bold tracking-wide">Laws & Decrees</h1>
          <p className="text-gray-500 mt-1">National legislation and announcements</p>
        </div>
        <button onClick={()=>setDialogOpen(true)} className="bg-blue-500 text-white px-3 py-1 rounded flex items-center gap-2">
          <Plus className="w-4 h-4"/> Enact New
        </button>
      </div>

      {dialogOpen && (
        <div className="fixed inset-0 flex items-center justify-center bg-black/30 z-50">
          <div className="bg-white p-6 rounded w-96">
            <h2 className="text-lg font-bold mb-4">{editing ? 'Edit Law' : 'Enact New Law'}</h2>
            <form className="space-y-3" onSubmit={handleSubmit}>
              <div>
                <label className="block text-sm font-medium">Title</label>
                <input className="w-full border rounded px-2 py-1" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} required/>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="block text-sm font-medium">Type</label>
                  <select className="w-full border rounded px-2 py-1" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                    {Object.keys(typeConfig).map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium">Status</label>
                  <select className="w-full border rounded px-2 py-1" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                    <option value="active">Active</option>
                    <option value="draft">Draft</option>
                    <option value="repealed">Repealed</option>
                  </select>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="block text-sm font-medium">Enacted Date</label>
                  <input type="date" className="w-full border rounded px-2 py-1" value={form.enacted_date} onChange={e=>setForm({...form,enacted_date:e.target.value})}/>
                </div>
                <div>
                  <label className="block text-sm font-medium">Author</label>
                  <input className="w-full border rounded px-2 py-1" value={form.author} onChange={e=>setForm({...form,author:e.target.value})}/>
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium">Content</label>
                <textarea className="w-full border rounded px-2 py-1" value={form.content} onChange={e=>setForm({...form,content:e.target.value})}></textarea>
              </div>
              <div className="flex justify-end gap-2">
                <button type="button" onClick={resetForm} className="px-3 py-1 border rounded">Cancel</button>
                <button type="submit" className="px-3 py-1 bg-blue-500 text-white rounded">{editing?'Update':'Enact'}</button>
              </div>
            </form>
          </div>
        </div>
      )}

      <div className="space-y-4">
        {laws.map(l=>{
          const config = typeConfig[l.type] || typeConfig.law;
          const Icon = config.icon;
          return (
            <div key={l.id} className="border rounded p-4 flex justify-between items-start group hover:border-blue-300 transition">
              <div className="flex gap-4 flex-1">
                <div className={`p-2.5 rounded-lg shrink-0 ${config.color}`}><Icon className="w-5 h-5"/></div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    <h3 className="font-semibold text-lg">{l.title}</h3>
                    <span className="text-xs px-2 py-0.5 rounded border">{l.type}</span>
                    <span className="text-xs px-2 py-0.5 rounded border">{l.status}</span>
                  </div>
                  <p className="text-sm text-gray-500 whitespace-pre-wrap">{l.content}</p>
                  <div className="flex items-center gap-3 mt-3 text-xs text-gray-400">
                    {l.author && <span>By {l.author}</span>}
                    {l.enacted_date && <span>{format(new Date(l.enacted_date),'MMM d, yyyy')}</span>}
                  </div>
                </div>
              </div>
              <div className="flex gap-1 opacity-0 group-hover:opacity-100">
                <button className="text-gray-500" onClick={()=>handleEdit(l)}><Pencil className="w-4 h-4"/></button>
                <button className="text-red-600" onClick={()=>alert('Delete simulated')}><Trash2 className="w-4 h-4"/></button>
              </div>
            </div>
          )
        })}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<Laws/>);

</script>
</body>
</html>
