<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Select</title>
<style>
  body {
    font-family: sans-serif;
    padding: 50px;
  }

  .select-wrapper {
    position: relative;
    width: 200px;
  }

  .select-trigger {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    transition: border 0.2s;
  }

  .select-trigger:hover {
    border-color: #888;
  }

  .select-trigger svg {
    width: 16px;
    height: 16px;
    transition: transform 0.3s;
  }

  .select-trigger.open svg {
    transform: rotate(180deg);
  }

  .select-content {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    max-height: 200px;
    overflow-y: auto;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-top: 4px;
    z-index: 100;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    display: none;
  }

  .select-content.show {
    display: block;
  }

  .select-item {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .select-item:hover {
    background-color: #f0f0f0;
  }

  .select-item.selected::after {
    content: "✔";
    color: green;
  }

  .select-separator {
    height: 1px;
    background: #ddd;
    margin: 4px 0;
  }
</style>
</head>
<body>

<div class="select-wrapper">
  <div class="select-trigger" id="selectTrigger">
    <span id="selectedValue">Select an option</span>
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.25a.75.75 0 01-1.06 0L5.21 8.27a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
    </svg>
  </div>
  <div class="select-content" id="selectContent">
    <div class="select-item" data-value="Option 1">Option 1</div>
    <div class="select-item" data-value="Option 2">Option 2</div>
    <div class="select-item" data-value="Option 3">Option 3</div>
    <div class="select-separator"></div>
    <div class="select-item" data-value="Option 4">Option 4</div>
  </div>
</div>

<script>
  const trigger = document.getElementById('selectTrigger');
  const content = document.getElementById('selectContent');
  const selectedValue = document.getElementById('selectedValue');
  const items = content.querySelectorAll('.select-item');

  trigger.addEventListener('click', () => {
    content.classList.toggle('show');
    trigger.classList.toggle('open');
  });

  items.forEach(item => {
    item.addEventListener('click', () => {
      selectedValue.textContent = item.dataset.value;

      // Mark selected
      items.forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');

      content.classList.remove('show');
      trigger.classList.remove('open');
    });
  });

  // Close dropdown if clicked outside
  document.addEventListener('click', (e) => {
    if (!trigger.contains(e.target) && !content.contains(e.target)) {
      content.classList.remove('show');
      trigger.classList.remove('open');
    }
  });
</script>

</body>
</html>
