<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alert Component</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 20px;
  }

  .alert {
    position: relative;
    width: 100%;
    border-radius: 8px;
    border: 1px solid #334155;
    padding: 12px 16px;
    margin-bottom: 15px;
    font-size: 0.9em;
    background: #1e293b; /* default background */
    color: white;       /* default text color */
  }

  .alert.destructive {
    border-color: #f87171; /* red border */
    color: #f87171;
    background: #1e293b;
  }

  .alert svg {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 16px;
    height: 16px;
  }

  .alert .content {
    padding-left: 28px; /* leave space for icon */
  }

  .alert-title {
    margin: 0 0 4px 0;
    font-weight: bold;
  }

  .alert-description p {
    margin: 0;
    line-height: 1.4;
  }
</style>
</head>
<body>

<h2>Alert Component Demo</h2>

<!-- Default alert -->
<div class="alert">
  <div class="content">
    <h5 class="alert-title">Info Alert</h5>
    <div class="alert-description">
      <p>This is a default alert message.</p>
    </div>
  </div>
</div>

<!-- Destructive alert -->
<div class="alert destructive">
  <div class="content">
    <h5 class="alert-title">Error Alert</h5>
    <div class="alert-description">
      <p>This is a destructive alert message.</p>
    </div>
  </div>
</div>

</body>
</html>
