<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Calendar</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .calendar { display: inline-block; border-collapse: collapse; padding: 10px; }
  .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .calendar-header button { background: transparent; border: 1px solid #d1d5db; border-radius: 0.375rem; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .calendar-header button:hover { background: #f3f4f6; }
  .month-label { font-weight: bold; font-size: 1rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: center; width: 40px; height: 40px; }
  th { color: #6b7280; font-weight: normal; }
  td { cursor: pointer; border-radius: 0.375rem; transition: background-color 0.2s; }
  td:hover { background-color: #e0f2fe; }
  .today { background-color: #fef3c7; }
  .selected { background-color: #3b82f6; color: white; }
  .outside { color: #9ca3af; }
  .disabled { color: #d1d5db; pointer-events: none; opacity: 0.5; }
</style>
</head>
<body>

<h1>Static Calendar</h1>

<div class="calendar-container">
  <div class="calendar-header">
    <button id="prev-month">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="month-label" id="month-label">March 2026</div>
    <button id="next-month">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <table class="calendar" id="calendar-table">
    <thead>
      <tr>
        <th>Su</th><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th>
      </tr>
    </thead>
    <tbody id="calendar-body"></tbody>
  </table>
</div>

<script>
const calendarBody = document.getElementById('calendar-body');
const monthLabel = document.getElementById('month-label');
let currentDate = new Date();

function renderCalendar(date) {
  calendarBody.innerHTML = '';
  const year = date.getFullYear();
  const month = date.getMonth();
  monthLabel.textContent = date.toLocaleString('default', { month: 'long', year: 'numeric' });

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const prevLastDate = new Date(year, month, 0).getDate();

  let row = document.createElement('tr');
  let dayCount = 0;

  // Previous month days
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('td');
    cell.textContent = prevLastDate - firstDay + 1 + i;
    cell.className = 'outside';
    row.appendChild(cell);
    dayCount++;
  }

  // Current month days
  for (let i = 1; i <= lastDate; i++) {
    if (dayCount % 7 === 0) {
      calendarBody.appendChild(row);
      row = document.createElement('tr');
    }
    const cell = document.createElement('td');
    cell.textContent = i;
    const today = new Date();
    if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
      cell.classList.add('today');
    }
    cell.addEventListener('click', () => {
      calendarBody.querySelectorAll('td').forEach(td => td.classList.remove('selected'));
      cell.classList.add('selected');
    });
    row.appendChild(cell);
    dayCount++;
  }

  // Next month days
  let nextDay = 1;
  while (dayCount % 7 !== 0) {
    const cell = document.createElement('td');
    cell.textContent = nextDay++;
    cell.className = 'outside';
    row.appendChild(cell);
    dayCount++;
  }

  calendarBody.appendChild(row);
}

document.getElementById('prev-month').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar(currentDate);
});

document.getElementById('next-month').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar(currentDate);
});

// Initial render
renderCalendar(currentDate);
</script>

</body>
</html>
