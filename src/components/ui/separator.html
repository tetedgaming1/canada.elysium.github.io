<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Separator Example</title>
<style>
  body {
    font-family: sans-serif;
    padding: 50px;
  }

  /* Horizontal separator */
  .separator-horizontal {
    width: 100%;
    height: 1px;
    background-color: #ccc; /* Matches bg-border in your design */
    margin: 16px 0;
  }

  /* Vertical separator */
  .separator-vertical {
    width: 1px;
    height: 100%;
    background-color: #ccc;
    display: inline-block;
    margin: 0 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<h2>Horizontal Separator</h2>
<p>Section 1</p>
<div class="separator-horizontal"></div>
<p>Section 2</p>

<h2>Vertical Separator in a row</h2>
<div style="display: flex; align-items: center;">
  <span>Item A</span>
  <div class="separator-vertical"></div>
  <span>Item B</span>
  <div class="separator-vertical"></div>
  <span>Item C</span>
</div>

</body>
</html>
