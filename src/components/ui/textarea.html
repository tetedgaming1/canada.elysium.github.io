<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styled Textarea</title>
<style>
  body {
    font-family: sans-serif;
    padding: 2rem;
    background-color: #f9fafb;
    color: #111827;
  }

  .textarea {
    width: 100%;
    min-height: 60px;
    padding: 0.5rem 0.75rem;
    border-radius: 0.375rem;
    border: 1px solid #d1d5db; /* input border */
    background-color: transparent;
    color: #111827;
    font-size: 1rem;
    line-height: 1.5rem;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    resize: vertical;
    transition: all 0.2s;
  }

  .textarea::placeholder {
    color: #6b7280; /* muted foreground */
  }

  .textarea:focus {
    outline: none;
    border-color: #6366f1; /* ring color */
    box-shadow: 0 0 0 1px #6366f1;
  }

  .textarea:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  @media (min-width: 768px) {
    .textarea {
      font-size: 0.875rem;
      line-height: 1.25rem;
    }
  }
</style>
</head>
<body>

<h2>Styled Textarea</h2>

<textarea class="textarea" placeholder="Type your message here..."></textarea>

</body>
</html>
