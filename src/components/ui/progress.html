<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Bar</title>
<style>
  /* Base container */
  .progress-root {
    position: relative;
    width: 100%;
    height: 0.5rem; /* same as h-2 */
    background-color: rgba(59, 130, 246, 0.2); /* bg-primary/20 */
    border-radius: 9999px; /* rounded-full */
    overflow: hidden;
  }

  /* Indicator */
  .progress-indicator {
    height: 100%;
    background-color: #3b82f6; /* bg-primary */
    transition: transform 0.3s ease;
    transform-origin: left center;
    width: 100%;
    transform: translateX(0%);
  }
</style>
</head>
<body>

<!-- Example Progress at 70% -->
<div class="progress-root">
  <div class="progress-indicator" style="transform: translateX(-30%);"></div>
</div>

<!-- Example Progress at 40% -->
<div class="progress-root" style="margin-top: 1rem;">
  <div class="progress-indicator" style="transform: translateX(-60%);"></div>
</div>

</body>
</html>
