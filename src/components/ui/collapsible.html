<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Collapsible</title>
<style>
  details {
    border: 1px solid #ccc;
    border-radius: 0.5rem;
    padding: 0.5rem 1rem;
    width: 300px;
    margin: 1rem auto;
    background: #f9fafb;
  }
  summary {
    cursor: pointer;
    font-weight: 600;
    outline: none;
  }
  details[open] summary::after {
    content: "▲";
    float: right;
  }
  summary::after {
    content: "▼";
    float: right;
  }
  .collapsible-content {
    padding: 0.5rem 0;
    animation: slideDown 0.2s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 500px; }
  }
</style>
</head>
<body>

<details>
  <summary>Click to Expand</summary>
  <div class="collapsible-content">
    <p>This is the content inside the collapsible section.</p>
    <p>You can put any HTML content here.</p>
  </div>
</details>

</body>
</html>
