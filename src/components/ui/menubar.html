<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Menubar</title>
<style>
  body { font-family: sans-serif; margin: 2rem; }

  /* Menubar container */
  .menubar {
    display: flex;
    align-items: center;
    height: 2.25rem;
    gap: 0.25rem;
    padding: 0.25rem;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  /* Menubar trigger */
  .menubar-trigger {
    position: relative;
    cursor: pointer;
    user-select: none;
    padding: 0.375rem 0.75rem;
    border-radius: 0.25rem;
    font-size: 0.875rem;
    font-weight: 500;
    background: transparent;
    transition: background 0.2s;
  }
  .menubar-trigger:focus, .menubar-trigger:hover {
    background: #3b82f6;
    color: #fff;
    outline: none;
  }

  /* Submenu */
  .menubar-subcontent {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    min-width: 12rem;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    padding: 0.25rem 0;
    z-index: 50;
  }

  .menubar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.375rem 0.5rem;
    font-size: 0.875rem;
    cursor: pointer;
    border-radius: 0.25rem;
  }
  .menubar-item:hover {
    background: #3b82f6;
    color: #fff;
  }

  /* Submenu on hover */
  .menubar-sub:hover .menubar-subcontent {
    display: block;
  }

  .menubar-separator {
    height: 1px;
    margin: 0.25rem 0;
    background: #d1d5db;
  }

  .menubar-shortcut {
    margin-left: auto;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: #6b7280;
  }

  .chevron-right {
    margin-left: 0.25rem;
    width: 1rem;
    height: 1rem;
    display: inline-block;
    border-right: 2px solid currentColor;
    border-top: 2px solid currentColor;
    transform: rotate(45deg);
  }
</style>
</head>
<body>

<div class="menubar">
  <div class="menubar-trigger menubar-sub">
    File
    <div class="menubar-subcontent">
      <div class="menubar-item">New <span class="menubar-shortcut">Ctrl+N</span></div>
      <div class="menubar-item">Open <span class="menubar-shortcut">Ctrl+O</span></div>
      <div class="menubar-item menubar-sub">
        More
        <span class="chevron-right"></span>
        <div class="menubar-subcontent">
          <div class="menubar-item">Import</div>
          <div class="menubar-item">Export</div>
        </div>
      </div>
      <div class="menubar-separator"></div>
      <div class="menubar-item">Exit</div>
    </div>
  </div>

  <div class="menubar-trigger">Edit</div>
  <div class="menubar-trigger">View</div>
</div>

</body>
</html>
