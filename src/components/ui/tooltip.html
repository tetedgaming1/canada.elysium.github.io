<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Tooltip</title>
<style>
  body {
    font-family: sans-serif;
    padding: 2rem;
  }

  .tooltip-wrapper {
    position: relative;
    display: inline-block;
  }

  .tooltip-trigger {
    cursor: pointer;
    padding: 0.5rem 1rem;
    background-color: #3b82f6;
    color: white;
    border: none;
    border-radius: 0.375rem;
  }

  .tooltip-content {
    position: absolute;
    z-index: 50;
    background-color: #1e40af; /* primary */
    color: #f3f4f6; /* primary-foreground */
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    border-radius: 0.375rem;
    white-space: nowrap;
    opacity: 0;
    transform: scale(0.95);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }

  .tooltip-content.show {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  /* Positioning variants */
  .tooltip-content[data-side="top"] {
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) scale(0.95);
    margin-bottom: 0.25rem;
  }

  .tooltip-content[data-side="bottom"] {
    top: 100%;
    left: 50%;
    transform: translateX(-50%) scale(0.95);
    margin-top: 0.25rem;
  }

  .tooltip-content[data-side="left"] {
    right: 100%;
    top: 50%;
    transform: translateY(-50%) scale(0.95);
    margin-right: 0.25rem;
  }

  .tooltip-content[data-side="right"] {
    left: 100%;
    top: 50%;
    transform: translateY(-50%) scale(0.95);
    margin-left: 0.25rem;
  }
</style>
</head>
<body>

<h2>Vanilla Tooltip</h2>

<div class="tooltip-wrapper">
  <button class="tooltip-trigger">Hover me</button>
  <div class="tooltip-content" data-side="top">This is a tooltip</div>
</div>

<div class="tooltip-wrapper" style="margin-left:2rem;">
  <button class="tooltip-trigger">Hover me too</button>
  <div class="tooltip-content" data-side="right">Another tooltip</div>
</div>

<script>
  document.querySelectorAll('.tooltip-wrapper').forEach(wrapper => {
    const trigger = wrapper.querySelector('.tooltip-trigger');
    const tooltip = wrapper.querySelector('.tooltip-content');

    trigger.addEventListener('mouseenter', () => {
      tooltip.classList.add('show');
    });
    trigger.addEventListener('mouseleave', () => {
      tooltip.classList.remove('show');
    });
  });
</script>

</body>
</html>
