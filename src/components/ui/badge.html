<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Example</title>
  <style>
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      padding: 0.125rem 0.625rem;
      font-size: 0.75rem;
      font-weight: 600;
      transition: background-color 0.2s;
      cursor: default;
    }

    /* Variant styles */
    .badge[data-variant="default"] {
      background-color: #3b82f6; /* blue */
      color: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .badge[data-variant="default"]:hover {
      background-color: #2563eb;
    }

    .badge[data-variant="secondary"] {
      background-color: #6b7280; /* gray */
      color: white;
    }
    .badge[data-variant="secondary"]:hover {
      background-color: #4b5563;
    }

    .badge[data-variant="destructive"] {
      background-color: #ef4444; /* red */
      color: white;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .badge[data-variant="destructive"]:hover {
      background-color: #dc2626;
    }

    .badge[data-variant="outline"] {
      background-color: transparent;
      color: #111827; /* dark text */
      border-color: #d1d5db;
    }
    .badge[data-variant="outline"]:hover {
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>
  <h1>Badge Examples</h1>

  <div class="badge" data-variant="default">Default Badge</div>
  <div class="badge" data-variant="secondary">Secondary Badge</div>
  <div class="badge" data-variant="destructive">Destructive Badge</div>
  <div class="badge" data-variant="outline">Outline Badge</div>

</body>
</html>
